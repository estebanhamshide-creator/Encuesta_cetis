<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Encuesta Pavimentación CETIS 23</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="container">
    <h1>Encuesta sobre Pavimentación y Derechos Humanos</h1>

    <p><strong>Propósito:</strong> Identificar problemáticas de pavimentación, movilidad y desigualdad urbana en la comunidad del CETIS 23.</p>

    <h2>Datos generales</h2>
    <input type="text" id="nombre" placeholder="Nombre (opcional)">
    <input type="number" id="edad" placeholder="Edad">

    <h2>Pavimentación y movilidad</h2>
    <label>¿Cómo calificas el estado de las calles?</label>
    <select id="calles">
        <option>Bueno</option>
        <option>Regular</option>
        <option>Malo</option>
    </select>

    <label>¿Te afecta la falta de pavimentación?</label>
    <select id="afecta">
        <option>Sí</option>
        <option>No</option>
    </select>

    <h2>Derechos humanos y desigualdad</h2>
    <label>¿Consideras que hay desigualdad en infraestructura?</label>
    <select id="desigualdad">
        <option>Sí</option>
        <option>No</option>
    </select>

    <h2>Participación comunitaria</h2>
    <label>¿Has participado en mejoras de tu comunidad?</label>
    <select id="participacion">
        <option>Sí</option>
        <option>No</option>
    </select>

    <h2>Observaciones</h2>
    <textarea id="observaciones"></textarea>

    <button onclick="guardar()">Enviar</button>

    <h2>Reporte</h2>
    <div id="reporte"></div>
</div>

<script src="script.js"></script>
</body>
</html>
