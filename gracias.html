<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Gracias</title>
  <style>
    body{
      margin:0;
      font-family: Arial, sans-serif;
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
      background: linear-gradient(135deg, #4facfe, #00f2fe);
      color:white;
      text-align:center;
    }

    .box{
      background: rgba(255,255,255,0.15);
      padding:40px;
      border-radius:15px;
      backdrop-filter: blur(10px);
    }

    h1{
      font-size:32px;
      margin-bottom:10px;
    }

    p{
      font-size:18px;
      margin-bottom:25px;
    }

    button{
      padding:12px 25px;
      font-size:16px;
      border:none;
      border-radius:10px;
      cursor:pointer;
      background:white;
      color:#333;
      transition:0.3s;
    }

    button:hover{
      background:#ddd;
    }
  </style>
</head>
<body>

<div class="box">
  <h1>✅ ¡Gracias!</h1>
  <p>Tu respuesta ha sido registrada correctamente.</p>

  <button onclick="volver()">Volver a la encuesta</button>
</div>

<script>
function volver(){
  window.location.href = "index.html";
}
</script>

</body>
</html>
